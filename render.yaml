services:
  - type: web
    name: cousin-backend
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9.15.0 && pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
